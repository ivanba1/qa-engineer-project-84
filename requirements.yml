functional:
  - Пользователь должен иметь возможность просматривать каталог товаров с названием, рейтингом, ценой со скидкой и без неё.
  - Пользователь должен иметь возможность просматривать подробную информацию о товаре (на отдельной странице товара) с названием, рейтингом, ценой со скидкой и без неё.
  - Пользователь должен иметь возможность добавлять товары в корзину из каталога или со страницы товара.
  - Пользователь должен иметь возможность просматривать содержимое корзины.
  - Пользователь должен иметь возможность удалять товар из корзины.
  - Пользователь должен иметь возможность продолжить выбор товаров (вернуться в каталог) со страницы корзины.
  - Пользователь должен иметь возможность оформить заказ с переходом на страницу оплаты.
  - Пользователь должен иметь возможность искать товары по ключевому слову.
  - Пользователь должен иметь возможность искать товары по категории.
  - Пользователь должен иметь возможность фильтровать товары (дополнительно к поиску).
  - Приложение должно реализовывать постраничный вывод товаров в каталоге.
  - Корзина должна сохраняться в сессии браузера (например, localStorage или sessionStorage).
  - Пользователь должен иметь возможность переключить язык интерфейса (русский/английский).

non-functional:
  - Сайт должен быть адаптивным (удобным на мобильных устройствах) — мобильная версия.
  - Сайт должен быть SPA (Single Page Application) без перезагрузки страниц.
  - Сайт должен быть оптимизирован для скорости работы.
  - Сайт должен быть безопасным и защищать данные пользователя.
  - Сайт должен быть протестирован на совместимость с последними версиями браузеров.
  - Сайт должен быть способен обрабатывать большое количество трафика (масштабируемость/производительность).
  - Сайт должен быть доступен на различных устройствах (кросс-девайсная совместимость).
  - Сайт должен быть доступен для пользователей без использования VPN (прямой доступ из сети Интернет).
  - Интерфейс должен поддерживать локализацию (перевод) на русский и английский языки.

implicit:
  - При отсутствии товаров по фильтру/поиску должно выводиться понятное пользователю сообщение (например, "Ничего не найдено").
  - Добавление товара в корзину должно сопровождаться визуальной обратной связью (уведомление, изменение иконки корзины и т.п.).
  - Содержимое корзины должно синхронизироваться между вкладками/окнами браузера (если используется sessionStorage/storage event).
  - Цена со скидкой должна быть визуально выделена, а цена без скидки — зачёркнута (или иным способом показана как старая).
  - При переходе на страницу оплаты корзина не должна автоматически очищаться без подтверждения успешного заказа (чтобы избежать потери данных при ошибке).
  - Постраничная навигация должна позволять переходить на первую, последнюю, следующую и предыдущую страницы, а также отображать текущую страницу.
  - Рейтинг товара должен отображаться в удобочитаемом формате (например, звёздами или числом от 1 до 5).
  - При переключении языка интерфейса содержимое корзины и выбранные фильтры не должны сбрасываться.
