---
- summary: |
    Успешное добавление товара в корзину со страницы каталога
  requirement: |
    Пользователь должен иметь возможность добавлять товары в корзину из каталога
  prerequisites: |
    Открыта главная страница каталога, в корзине нет товаров, пользователь не авторизован (гость)
  test-data: |
    Товар: "Смартфон X" (есть в каталоге), цена со скидкой: 20000 руб.
  steps:
    - Нажать кнопку «В корзину» на карточке товара "Смартфон X"
  expected-result: |
    - Появляется уведомление «Товар добавлен в корзину»
    - Иконка корзины в шапке сайта показывает количество товаров = 1
    - Кнопка «В корзину» у товара меняется на «В корзине» или становится неактивной (опционально)
    - При переходе в корзину там отображается "Смартфон X" с ценой 20000 руб.

- summary: |
    Успешное добавление товара в корзину со страницы товара
  requirement: |
    Пользователь должен иметь возможность добавлять товары в корзину со страницы товара
  prerequisites: |
    Открыта страница любого товара (например, "Смартфон X"), корзина пуста
  test-data: |
    Товар: "Смартфон X", количество в корзине до теста = 0
  steps:
    - Нажать кнопку «Добавить в корзину» на странице товара
  expected-result: |
    - Появляется уведомление об успешном добавлении
    - Счётчик на иконке корзины увеличивается на 1
    - Товар появляется в корзине с корректным названием и ценой

- summary: |
    Просмотр содержимого корзины с добавленными товарами
  requirement: |
    Пользователь должен иметь возможность просматривать содержимое корзины
  prerequisites: |
    В корзину ранее добавлен товар "Смартфон X" в количестве 1 шт.
  test-data: |
    Корзина: 1 товар ("Смартфон X", цена 20000 руб.)
  steps:
    - Нажать на иконку корзины в шапке сайта
    - Перейти на страницу корзины
  expected-result: |
    - Открывается страница корзины
    - В списке отображается товар "Смартфон X"
    - Цена товара = 20000 руб.
    - Общая сумма корзины = 20000 руб.
    - Присутствует кнопка «Оформить заказ» и «Продолжить покупки»

- summary: |
    Удаление товара из корзины
  requirement: |
    Пользователь должен иметь возможность удалять товар из корзины
  prerequisites: |
    В корзине есть хотя бы один товар (например, "Смартфон X")
  test-data: |
    Корзина: 1 товар ("Смартфон X")
  steps:
    - Открыть страницу корзины
    - Нажать кнопку «Удалить» (или корзину/крестик) рядом с товаром "Смартфон X"
  expected-result: |
    - Товар "Смартфон X" исчезает из списка
    - Корзина становится пустой
    - Отображается сообщение «Корзина пуста»
    - Счётчик на иконке корзины становится равен 0

- summary: |
    Переход на страницу оплаты из корзины
  requirement: |
    Пользователь должен иметь возможность оформить заказ с переходом на страницу оплаты
  prerequisites: |
    Корзина не пуста (добавлен хотя бы один товар)
  test-data: |
    Корзина: 1 товар "Смартфон X" за 20000 руб.
  steps:
    - Открыть страницу корзины
    - Нажать кнопку «Оформить заказ»
  expected-result: |
    - Происходит переход на страницу оплаты
    - На странице оплаты отображается сумма заказа (20000 руб.) и форма для ввода платёжных данных

- summary: |
    Поиск товаров по ключевому слову
  requirement: |
    Пользователь должен иметь возможность искать товары по ключевому слову
  prerequisites: |
    Открыта страница каталога, в каталоге есть товары «Смартфон X» и «Наушники Y»
  test-data: |
    Поисковый запрос: "Смартфон"
  steps:
    - Ввести в поле поиска «Смартфон»
    - Нажать кнопку «Найти» (или Enter)
  expected-result: |
    - В результатах отображается только товар «Смартфон X»
    - Товар «Наушники Y» не отображается
    - Если есть постраничный вывод, отображается первая страница результатов

- summary: |
    Поиск товаров по несуществующему ключевому слову
  requirement: |
    При отсутствии товаров по фильтру/поиску должно выводиться понятное пользователю сообщение
  prerequisites: |
    Открыта страница каталога
  test-data: |
    Поисковый запрос: "Абракадабра2025"
  steps:
    - Ввести в поле поиска «Абракадабра2025»
    - Нажать «Найти»
  expected-result: |
    - Отображается сообщение «Ничего не найдено» или «Товары не найдены»
    - Список товаров пуст
    - Постраничная навигация отсутствует или скрыта

- summary: |
    Фильтрация товаров по категории
  requirement: |
    Пользователь должен иметь возможность искать товары по категории
  prerequisites: |
    Открыт каталог, есть категории «Смартфоны» и «Наушники», в каждой есть хотя бы один товар
  test-data: |
    Категория: "Смартфоны"
  steps:
    - Выбрать категорию «Смартфоны» в фильтре (например, выпадающий список или чекбокс)
    - Применить фильтр
  expected-result: |
    - Показываются только товары из категории «Смартфоны»
    - Товары из категории «Наушники» отсутствуют в результатах

- summary: |
    Переключение языка интерфейса с русского на английский
  requirement: |
    Пользователь должен иметь возможность переключить язык интерфейса
  prerequisites: |
    Открыта любая страница (например, каталог), текущий язык — русский
  test-data: |
    Язык: английский (English)
  steps:
    - Нажать на переключатель языка (иконка/кнопка «РУ» / «EN»)
    - Выбрать «English»
  expected-result: |
    - Интерфейс переключается на английский язык
    - Текст кнопок, меню, фильтров, сообщений отображается на английском
    - Товары (названия, цены) остаются на исходном языке (или также переводятся, если предусмотрено)
    - Выбранные фильтры и содержимое корзины не сбрасываются

- summary: |
    Сохранение корзины после перезагрузки страницы
  requirement: |
    Корзина должна сохраняться в сессии браузера
  prerequisites: |
    В корзину добавлен товар «Смартфон X» (1 шт.)
  test-data: |
    Корзина: 1 товар ("Смартфон X")
  steps:
    - Перезагрузить страницу (F5 или Ctrl+R)
    - Открыть корзину
  expected-result: |
    - В корзине по-прежнему находится товар «Смартфон X» в количестве 1 шт.
    - Счётчик на иконке корзины показывает 1

- summary: |
    Адаптивная вёрстка на мобильном устройстве (вертикальная ориентация)
  requirement: |
    Сайт должен быть адаптивным (удобным на мобильных устройствах)
  prerequisites: |
    Открыть сайт в эмуляторе мобильного устройства (например, iPhone 12/13, ширина 390px) или на реальном телефоне
  test-data: |
    Размер экрана: 390x844 пикселей
  steps:
    - Открыть каталог
    - Открыть страницу товара
    - Открыть корзину
  expected-result: |
    - Интерфейс не выходит за границы экрана (нет горизонтальной прокрутки)
    - Карточки товаров располагаются в один или два столбца, читаемы
    - Кнопки и ссылки имеют достаточный размер для нажатия пальцем (не менее 44x44 px)
    - Текст не накладывается на элементы

- summary: |
    Постраничный вывод — переход на следующую страницу
  requirement: |
    Приложение должно реализовывать постраничный вывод товаров в каталоге
  prerequisites: |
    В каталоге более 12 товаров (или больше лимита на страницу), открыта 1-я страница
  test-data: |
    Количество товаров: 20, лимит на страницу: 12
  steps:
    - Пролистать вниз до блока пагинации
    - Нажать кнопку «Далее» или «Следующая страница» (или номер страницы 2)
  expected-result: |
    - Загружается вторая страница результатов
    - URL (если используется роутинг) меняется (например, /catalog?page=2)
    - Показываются следующие товары, не повторяющие товары с первой страницы
    - Активным становится номер страницы 2

- summary: |
    Отображение старой и новой цены со скидкой
  requirement: |
    На странице товара и в каталоге нужно выводить цену со скидкой и без неё
  prerequisites: |
    Открыть товар, у которого есть скидка (например, старая цена 30000, новая 20000)
  test-data: |
    Товар: "Смартфон X", старая цена: 30000 руб., новая цена: 20000 руб., скидка: 33%
  steps:
    - Посмотреть карточку товара в каталоге
    - Открыть страницу этого же товара
  expected-result: |
    - В каталоге отображается новая цена 20000 руб. (жирным/крупно) и старая цена 30000 руб. (зачёркнутая)
    - На странице товара аналогично: новая цена выделена, старая зачёркнута
    - Рядом с ценой указан размер скидки (например, «-33%») — опционально, но желательно
