bugreports:
  - summary: |
      [РЕГРЕССИЯ] Кнопка "Next" отправляет запрос за пределы последней страницы, отображая пустой каталог (не исправлено)
    environment: |
      Вторая версия приложения (Hexlet Products Store)
      Браузер: Google Chrome 120.0.6099.130 (Официальная сборка), 64 бит
      ОС: Windows 11
    steps-to-reproduce: |
      1. Открыть главную страницу каталога.
      2. Нажимать кнопку "Next" до достижения последней страницы.
      3. Нажать кнопку "Next" еще раз.
    expected-result: |
      Кнопка "Next" становится неактивной, запрос не отправляется.
    actual-result: |
      Отправляется запрос с skip >= total, возвращается пустой список, отображается "Nothing found!".

  - summary: |
      [РЕГРЕССИЯ] Применение фильтров не сбрасывает пагинацию (skip) (не исправлено)
    environment: |
      Вторая версия приложения (Hexlet Products Store)
      Браузер: Google Chrome 120.0.6099.130 (Официальная сборка), 64 бит
      ОС: Windows 11
    steps-to-reproduce: |
      1. Открыть каталог.
      2. Перейти на вторую страницу (кнопкой "Next").
      3. Выбрать любую категорию в фильтре.
    expected-result: |
      Отображаются товары выбранной категории, начиная с первой страницы.
    actual-result: |
      Отображаются товары выбранной категории со смещением, соответствующим второй странице.

  - summary: |
      [РЕГРЕССИЯ] Переключение языка сбрасывает фильтры и поиск (не исправлено)
    environment: |
      Вторая версия приложения (Hexlet Products Store)
      Браузер: Google Chrome 120.0.6099.130 (Официальная сборка), 64 бит
      ОС: Windows 11
    steps-to-reproduce: |
      1. Ввести поисковый запрос "phone".
      2. Выбрать категорию "smartphones".
      3. Сменить язык с английского на русский.
    expected-result: |
      Поисковый запрос и фильтр категории сохраняются.
    actual-result: |
      Поисковый запрос и фильтр сбрасываются, показываются все товары.

  - summary: |
      [РЕГРЕССИЯ] Отсутствует визуальная обратная связь при добавлении в корзину (не исправлено)
    environment: |
      Вторая версия приложения (Hexlet Products Store)
      Браузер: Google Chrome 120.0.6099.130 (Официальная сборка), 64 бит
      ОС: Windows 11
    steps-to-reproduce: |
      1. Нажать "Add to cart" на любом товаре.
    expected-result: |
      Появляется уведомление или меняется текст кнопки.
    actual-result: |
      Нет никакой обратной связи, кроме изменения счетчика корзины.

  - summary: |
      [РЕГРЕССИЯ] Ошибка оформления заказа не показывается пользователю (не исправлено)
    environment: |
      Вторая версия приложения (Hexlet Products Store)
      Браузер: Google Chrome 120.0.6099.130 (Официальная сборка), 64 бит
      ОС: Windows 11
    steps-to-reproduce: |
      1. Добавить товар в корзину.
      2. Нажать "Checkout".
    expected-result: |
      При ошибке сети/сервера показывается сообщение об ошибке.
    actual-result: |
      Открывается модальное окно с "успешным заказом", ошибка только в консоли.

  - summary: |
      [РЕГРЕССИЯ] В карточке каталога не отображается процент скидки (не исправлено)
    environment: |
      Вторая версия приложения (Hexlet Products Store)
      Браузер: Google Chrome 120.0.6099.130 (Официальная сборка), 64 бит
      ОС: Windows 11
    steps-to-reproduce: |
      1. Открыть каталог.
      2. Найти товар со скидкой.
    expected-result: |
      На карточке товара отображается процент скидки (например, "-12%").
    actual-result: |
      Отображается только старая (зачеркнутая) и новая цена. Процент скидки отсутствует.
