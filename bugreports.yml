---
- summary: |
    Кнопка "Next" отправляет запрос за пределы последней страницы, отображая пустой каталог
  environment: |
    Приложение: Hexlet Products Store (SPA)
    Браузер: Google Chrome 120.0.6099.130 (Официальная сборка), 64 бит
    ОС: Windows 11 / macOS Sonoma 14.2
    Сеть: Локальное тестирование (dummyjson.com)
  steps-to-reproduce: |
    1. Открыть главную страницу каталога (store).
    2. Нажимать кнопку "Next" до тех пор, пока не будет достигнута последняя страница (например, skip + limit >= total).
    3. Нажать кнопку "Next" еще раз.
  expected-result: |
    - Кнопка "Next" становится неактивной (disabled) или скрывается.
    - Запрос к API не отправляется.
    - Пользователь остается на последней странице с товарами.
  actual-result: |
    - Запрос к `https://dummyjson.com/products?skip=100` (значение skip >= total) отправляется.
    - Сервер возвращает пустой массив `{ "products": [], "total": 100 }`.
    - В каталоге отображается сообщение "Nothing found!" вместо товаров.
    - Кнопка "Next" остается активной.

- summary: |
    Применение фильтров не сбрасывает пагинацию (skip), что приводит к отображению "смещенных" результатов
  environment: |
    Приложение: Hexlet Products Store (SPA)
    Браузер: Google Chrome 120.0.6099.130 (Официальная сборка), 64 бит
    ОС: Windows 11
  steps-to-reproduce: |
    1. Открыть главную страницу каталога.
    2. Нажать кнопку "Next", чтобы перейти на вторую страницу (skip = 10).
    3. Выбрать любую категорию в фильтре (например, "smartphones").
  expected-result: |
    - Список товаров обновляется: показываются смартфоны, начиная с первой страницы (skip = 0).
    - Состояние skip в приложении сбрасывается на 0.
  actual-result: |
    - Список товаров обновляется, но показывает смартфоны, начиная со второй страницы (пропущены первые N смартфонов из выборки).
    - Пагинация остается на той же позиции (skip = 10), что визуально сбивает пользователя с толку.

- summary: |
    Переключение языка интерфейса сбрасывает все активные фильтры и поисковый запрос
  environment: |
    Приложение: Hexlet Products Store (SPA)
    Браузер: Google Chrome 120.0.6099.130 (Официальная сборка), 64 бит
    ОС: Windows 11
  steps-to-reproduce: |
    1. Открыть главную страницу каталога.
    2. Ввести в поле поиска любое слово (например, "phone").
    3. Выбрать категорию товаров (например, "smartphones").
    4. В правом верхнем углу нажать на переключатель языка и выбрать другой язык (например, "Russian").
  expected-result: |
    - Поисковый запрос "phone" остается в поле ввода.
    - Фильтр категории отображает выбранную категорию (или её перевод).
    - Список товаров обновляется с учетом фильтров, но на выбранном языке.
  actual-result: |
    - Поле поиска очищается.
    - Фильтр категории сбрасывается на значение по умолчанию.
    - Отображаются все товары (без фильтрации).

- summary: |
    Отсутствует визуальная обратная связь при добавлении товара в корзину
  environment: |
    Приложение: Hexlet Products Store (SPA)
    Браузер: Google Chrome 120.0.6099.130 (Официальная сборка), 64 бит
    ОС: Windows 11
  steps-to-reproduce: |
    1. Открыть главную страницу каталога.
    2. На карточке любого товара нажать кнопку "Add to cart".
  expected-result: |
    - Пользователь видит подтверждение: всплывающее уведомление (toast) или текст на кнопке меняется на "Added!" на 1-2 секунды.
  actual-result: |
    - Счетчик на иконке корзины увеличивается, но визуального оповещения о самом действии нет. Пользователь может не заметить изменение счетчика.

- summary: |
    Ошибка при оформлении заказа не отображается пользователю (логируется только в консоль)
  environment: |
    Приложение: Hexlet Products Store (SPA)
    Браузер: Google Chrome 120.0.6099.130 (Официальная сборка), 64 бит
    ОС: Windows 11
  steps-to-reproduce: |
    1. Добавить любой товар в корзину.
    2. Перейти на страницу корзины ("/cart").
    3. Нажать кнопку "Checkout".
  expected-result: |
    - В случае ошибки при отправке заказа (например, сетевой ошибки или ошибки сервера) пользователь видит понятное сообщение: "Не удалось оформить заказ. Попробуйте позже."
  actual-result: |
    - Открывается модальное окно с сообщением об успешном заказе (из-за заглушки).
    - В консоль браузера выводится ошибка: "Failed to load resource: ... /http/500/failed".
    - Пользователь не информирован о проблеме.

- summary: |
    В карточке каталога не отображается процент скидки
  environment: |
    Приложение: Hexlet Products Store (SPA)
    Браузер: Google Chrome 120.0.6099.130 (Официальная сборка), 64 бит
    ОС: Windows 11
  steps-to-reproduce: |
    1. Открыть главную страницу каталога.
    2. Найти товар со скидкой (например, "iPhone 9").
    3. Нажать на карточку товара, чтобы перейти на страницу товара.
  expected-result: |
    - На странице товара отображается процент скидки (например, "12% Off").
    - В карточке товара в каталоге процент скидки также должен отображаться для привлечения внимания пользователя.
  actual-result: |
    - На странице товара процент скидки есть.
    - В карточке каталога отображается только новая и зачеркнутая старая цена, процент скидки отсутствует.
